<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up Life</title>
    <!-- Favicon: Orange background with white lightning bolt -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23ff6b35'/%3E%3Cpath d='M55 20 L35 55 H50 L45 85 L65 45 H50 L55 20 Z' fill='white' stroke='white' stroke-width='2' stroke-linejoin='round'/%3E%3C/svg%3E" type="image/svg+xml">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Date Fns -->
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <!-- FullCalendar -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .fade-in { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        
        /* Modern Clean Card */
        .clean-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* FullCalendar Dark Theme Overrides */
        .fc-theme-standard td, .fc-theme-standard th { border-color: rgba(255, 255, 255, 0.08) !important; }
        .fc-theme-standard .fc-scrollgrid { border-color: rgba(255, 255, 255, 0.08) !important; }
        .fc-button-primary { background-color: rgba(15, 23, 42, 0.6) !important; border-color: rgba(255, 255, 255, 0.08) !important; color: #cbd5e1 !important; }
        .fc-button-primary:hover { background-color: rgba(30, 41, 59, 0.8) !important; }
        .fc-button-primary:not(:disabled).fc-button-active, .fc-button-primary:not(:disabled):active { background-color: #3b82f6 !important; border-color: #3b82f6 !important; color: white !important; }
        .fc-day-today { background-color: rgba(59, 130, 246, 0.15) !important; }
        .fc-col-header-cell-cushion { color: #94a3b8 !important; font-weight: 600; }
        .fc-daygrid-day-number { color: #cbd5e1 !important; }
        .fc-event { border-width: 1px !important; border-style: solid !important; border-radius: 4px !important; padding: 2px 4px !important; font-size: 0.75rem !important; font-weight: 600 !important; }
        .fc-toolbar-title { color: #f8fafc !important; font-size: 1.25rem !important; font-weight: 700 !important; }
        .fc-toolbar { flex-wrap: wrap; gap: 8px; justify-content: center !important; }
        .fc-toolbar-chunk { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
        @media (max-width: 640px) {
            .fc-toolbar-title { font-size: 1rem !important; }
            .fc-header-toolbar { flex-direction: column; gap: 12px; }
        }
        
        /* Tooltip for Heatmap */
        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            z-index: 50;
            pointer-events: none;
            margin-bottom: 5px;
            border: 1px solid #333;
        }

        /* Custom scrollbar for textarea */
        textarea.custom-scrollbar::-webkit-scrollbar { width: 4px; }
        textarea.custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-[#020617] text-slate-100 antialiased selection:bg-[#ff6b35] selection:text-white min-h-screen flex flex-col">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-[#020617] z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="animate-spin text-[#ff6b35] mb-4">
            <i data-lucide="loader-2" class="w-10 h-10"></i>
        </div>
        <p class="text-slate-500 animate-pulse font-medium tracking-wide text-xs uppercase">Loading System...</p>
    </div>

    <!-- Fix for JS ID Reference -->
    <span id="user-display-name" class="hidden"></span>

    <!-- Login Screen -->
    <div id="login-screen" class="hidden min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
        <div class="absolute inset-0 overflow-hidden">
            <div class="absolute -top-[20%] -right-[10%] w-[600px] h-[600px] bg-[#ff6b35]/10 rounded-full blur-[120px]"></div>
            <!-- Changed from indigo to rose for a warmer, more consistent background gradient -->
            <div class="absolute -bottom-[20%] -left-[10%] w-[600px] h-[600px] bg-rose-500/10 rounded-full blur-[120px]"></div>
        </div>

        <div class="max-w-md w-full clean-card rounded-2xl p-8 relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-[#ff6b35] to-orange-600 rounded-xl mb-4 shadow-lg shadow-orange-500/20">
                    <i data-lucide="zap" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-3xl font-black text-white tracking-tight mb-2">Level Up Life</h1>
                <p class="text-slate-400 text-sm">Turn your habits into an adventure.</p>
            </div>

            <div id="auth-error" class="hidden mb-6 bg-red-500/10 border border-red-500/20 text-red-200 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i> <span id="auth-error-text"></span>
            </div>

            <form id="auth-form" class="space-y-4" onsubmit="event.preventDefault()">
                <div id="username-field" class="hidden">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-1">Hero Name</label>
                    <input type="text" id="input-username" class="w-full bg-slate-950/50 border border-slate-700 rounded-xl p-3 text-white placeholder-slate-600 focus:border-[#ff6b35] focus:ring-1 focus:ring-[#ff6b35] outline-none transition-all" placeholder="Enter your name">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-1">Email</label>
                    <input type="email" id="input-email" required class="w-full bg-slate-950/50 border border-slate-700 rounded-xl p-3 text-white placeholder-slate-600 focus:border-[#ff6b35] focus:ring-1 focus:ring-[#ff6b35] outline-none transition-all" placeholder="name@example.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-1">Password</label>
                    <input type="password" id="input-password" required class="w-full bg-slate-950/50 border border-slate-700 rounded-xl p-3 text-white placeholder-slate-600 focus:border-[#ff6b35] focus:ring-1 focus:ring-[#ff6b35] outline-none transition-all" placeholder="••••••••">
                </div>
                <button type="submit" id="btn-submit-auth" class="w-full bg-[#ff6b35] hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-orange-500/20 mt-2">
                    Start Journey
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-slate-800 flex justify-between items-center text-xs font-medium">
                <button id="btn-toggle-auth-mode" class="text-slate-400 hover:text-[#ff6b35] transition-colors">
                    Create new account
                </button>
                <button id="btn-offline-mode" class="text-slate-600 hover:text-slate-300 transition-colors">
                    Play Offline
                </button>
            </div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="hidden flex-1 flex flex-col">
        
        <!-- Header -->
        <header class="clean-card border-b border-slate-800 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-2 sm:px-4 py-2 sm:h-16 flex flex-wrap sm:flex-nowrap items-center justify-between gap-2 sm:gap-4">
                
                <!-- Brand -->
                <div class="flex items-center gap-2 sm:gap-3 w-auto shrink-0">
                    <div class="w-6 h-6 sm:w-8 sm:h-8 bg-[#ff6b35] rounded-lg flex items-center justify-center">
                        <i data-lucide="activity" class="w-4 h-4 sm:w-5 sm:h-5 text-white"></i>
                    </div>
                    <span class="font-bold text-base sm:text-lg text-white hidden md:block">Level Up Life</span>
                </div>

                <!-- Navigation Tabs -->
                <div class="flex items-center gap-1 sm:gap-2 bg-slate-900/50 p-1 rounded-lg border border-slate-800 shrink-0 order-3 sm:order-none w-full sm:w-auto justify-center mt-2 sm:mt-0">
                    <button id="nav-habits" onclick="switchTab('habits')" class="px-4 sm:px-4 py-1.5 rounded-md text-sm font-bold text-slate-400 hover:text-white transition-all flex-1 sm:flex-none">Habits</button>
                    <button id="nav-tasks" onclick="switchTab('tasks')" class="px-4 sm:px-4 py-1.5 rounded-md text-sm font-bold bg-[#ff6b35] text-white shadow-sm transition-all flex-1 sm:flex-none">TaskFlow</button>
                </div>

                <!-- Spacer -->
                <div class="hidden sm:block flex-1"></div>

                <!-- Simple Level & Stats -->
                <div class="w-auto flex justify-end items-center gap-3 sm:gap-6 shrink-0">
                     <div id="saving-indicator" class="hidden text-[#ff6b35] animate-pulse">
                        <i data-lucide="save" class="w-4 h-4"></i>
                    </div>

                    <div class="flex items-center gap-6">
                        <!-- Level / XP Simple -->
                        <div class="flex flex-col items-end">
                            <div class="flex items-baseline gap-1.5">
                                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">LVL</span>
                                <span id="top-level" class="text-xl font-black text-white leading-none">1</span>
                            </div>
                            <div class="w-24 h-1 bg-slate-800 rounded-full mt-1.5 overflow-hidden">
                                <div id="top-xp-bar" class="h-full bg-[#ff6b35] rounded-full" style="width: 0%"></div>
                            </div>
                            <!-- XP Text (Subtle) -->
                            <div class="text-[9px] font-medium text-slate-600 mt-0.5 opacity-80">
                                <span id="top-xp-text">0/100</span> XP
                            </div>
                        </div>
                        
                        <!-- Logout (No Icon) -->
                         <div class="flex items-center gap-2 pl-4 border-l border-slate-800/50">
                            <button id="btn-logout" class="text-slate-500 hover:text-white transition-colors p-1" title="Logout">
                                <i data-lucide="log-out" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-2 sm:px-4 py-4 sm:py-8 w-full flex-1 flex flex-col">
            
            <!-- Habits View -->
            <div id="view-habits" class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-8 items-start w-full" style="display: none;">
                
                <!-- LEFT COLUMN: Attributes & Consistency -->
                <div class="space-y-6">
                    
                    <!-- Attributes Card (Reduced min-height) -->
                    <div class="clean-card rounded-2xl p-6 flex flex-col min-h-[300px]">
                        <div class="flex items-center gap-2 mb-4">
                             <i data-lucide="activity" class="w-5 h-5 text-[#ff6b35]"></i>
                             <h3 class="text-lg font-bold text-white">Attributes</h3>
                        </div>

                        <!-- Chart -->
                        <div class="relative w-full flex-1 flex items-center justify-center">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>

                    <!-- Consistency Heatmap -->
                    <div class="clean-card p-5 rounded-2xl relative">
                        <div class="mb-4">
                            <h2 class="text-lg font-bold text-white flex items-center gap-2">
                                <i data-lucide="layout-grid" class="w-5 h-5 text-[#ff6b35]"></i>
                                Consistency
                            </h2>
                            <!-- Removed 4 Months History Text -->
                        </div>

                        <div class="space-y-6">
                            <!-- Good Habits -->
                            <div>
                                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full bg-[#ff6b35]"></span> Positive
                                </h4>
                                <div class="overflow-x-auto custom-scrollbar pb-2">
                                    <div class="min-w-max flex gap-2">
                                        <!-- Labels -->
                                        <div class="flex flex-col justify-between py-[17px] pr-1 text-[9px] text-slate-500 font-bold h-[100px]">
                                            <span>Mon</span><span>Wed</span><span>Fri</span>
                                        </div>
                                        <div class="flex-1">
                                            <div id="heatmap-months-good" class="flex relative h-4 text-[9px] text-slate-500 font-bold mb-1"></div>
                                            <div id="heatmap-grid-good" class="grid grid-rows-7 grid-flow-col gap-[3px] h-[81px]"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Bad Habits -->
                            <div>
                                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full bg-rose-500"></span> Negative
                                </h4>
                                <div class="overflow-x-auto custom-scrollbar pb-2">
                                    <div class="min-w-max flex gap-2">
                                        <!-- Labels -->
                                        <div class="flex flex-col justify-between py-[17px] pr-1 text-[9px] text-slate-500 font-bold h-[100px]">
                                            <span>Mon</span><span>Wed</span><span>Fri</span>
                                        </div>
                                        <div class="flex-1">
                                            <div id="heatmap-months-bad" class="flex relative h-4 text-[9px] text-slate-500 font-bold mb-1"></div>
                                            <div id="heatmap-grid-bad" class="grid grid-rows-7 grid-flow-col gap-[3px] h-[81px]"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT COLUMN: Habits List & Gratitude -->
                <div class="lg:col-span-2 space-y-6">
                    
                    <!-- Habits List -->
                    <div>
                        <div class="flex items-center justify-between mb-4 px-1">
                            <h3 class="text-sm font-bold text-slate-300 uppercase tracking-wider flex items-center gap-2">
                                <i data-lucide="check-circle-2" class="w-4 h-4 text-[#ff6b35]"></i> Positive Habits
                            </h3>
                            <button onclick="openModal('good')" class="text-xs font-bold text-[#ff6b35] hover:bg-[#ff6b35] hover:text-white px-2 py-1 rounded transition-colors border border-[#ff6b35]/30 flex items-center gap-1">
                                <i data-lucide="plus" class="w-3 h-3"></i> Add
                            </button>
                        </div>
                        <div id="good-habits-list" class="space-y-3"></div>
                    </div>

                    <!-- Bad Habits List -->
                    <div>
                        <div class="flex items-center justify-between mb-4 px-1 mt-8">
                            <h3 class="text-sm font-bold text-slate-300 uppercase tracking-wider flex items-center gap-2">
                                <i data-lucide="x-circle" class="w-4 h-4 text-rose-500"></i> Negative Habits
                            </h3>
                            <button onclick="openModal('bad')" class="text-xs font-bold text-rose-500 hover:bg-rose-500 hover:text-white px-2 py-1 rounded transition-colors border border-rose-500/30 flex items-center gap-1">
                                <i data-lucide="plus" class="w-3 h-3"></i> Add
                            </button>
                        </div>
                        <div id="bad-habits-list" class="space-y-3"></div>
                    </div>

                     <!-- Gratitude Journal (Switched from Amber to Indigo) -->
                     <div>
                        <div class="flex items-center justify-between mb-4 px-1 mt-8">
                            <h3 class="text-sm font-bold text-slate-300 uppercase tracking-wider flex items-center gap-2">
                                <!-- Changed Icon Color -->
                                <i data-lucide="book-open" class="w-4 h-4 text-indigo-400"></i> Daily Reflection
                            </h3>
                            <button onclick="toggleGratitudeHistory()" class="text-[10px] font-bold text-slate-500 hover:text-white transition-colors uppercase tracking-wider">
                                History
                            </button>
                        </div>
                        <!-- Changed to Textarea for Shift+Enter support -->
                        <div class="bg-slate-900/50 border border-slate-800 rounded-xl p-2 flex gap-2 mb-3 focus-within:border-indigo-500/50 transition-colors items-start">
                             <textarea id="gratitude-input" rows="1" placeholder="What are you grateful for today? (Shift+Enter to send)" class="bg-transparent w-full text-sm text-white placeholder-slate-600 px-2 outline-none resize-none py-1 custom-scrollbar"></textarea>
                             <!-- Changed Button Color -->
                             <button id="btn-add-gratitude" class="bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 rounded-lg px-3 py-1.5 transition-colors mt-0.5">
                                <i data-lucide="send" class="w-4 h-4"></i>
                             </button>
                        </div>
                        <!-- Removed Today's list, only rendering history when needed -->
                        <div id="gratitude-history" class="hidden mt-3 pt-3 border-t border-slate-800 space-y-2 max-h-[300px] overflow-y-auto"></div>
                    </div>
                </div>

            </div>

            <!-- Tasks View -->
            <div id="view-tasks" class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-8 items-start w-full flex-1" style="display: grid;">
                <!-- Left: FullCalendar -->
                <div class="lg:col-span-2 clean-card rounded-2xl p-2 sm:p-6 min-h-[500px] flex flex-col h-full relative">
                    <div id="calendar" class="flex-1 w-full h-full text-slate-300 mt-2"></div>
                </div>
                
                <!-- Right: Task List -->
                <div class="space-y-6 flex flex-col h-full">
                    <div class="clean-card rounded-2xl p-3 sm:p-6 flex flex-col flex-1 max-h-[800px]">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-bold text-white flex items-center gap-2">
                                <i data-lucide="list-todo" class="w-5 h-5 text-[#ff6b35]"></i> Tasks
                            </h3>
                        </div>
                        
                        <!-- Inline Add Task -->
                        <div class="mb-4 relative" id="new-task-container">
                            <div class="bg-slate-900/50 border border-slate-800 rounded-xl p-2 flex flex-col gap-2 focus-within:border-[#ff6b35]/50 transition-colors">
                                <div class="flex items-center gap-2">
                                    <i data-lucide="plus" class="w-4 h-4 text-slate-500 ml-2"></i>
                                    <input type="text" id="new-task-input" placeholder="Add a new task... (Enter to save)" class="bg-transparent w-full text-sm text-white placeholder-slate-600 px-2 outline-none">
                                </div>
                                
                                <!-- Options Panel (Hidden by default) -->
                                <div id="new-task-options" class="hidden flex-col gap-3 pt-3 pb-2 px-2 border-t border-slate-800/50 mt-1">
                                    <!-- Source Selection -->
                                    <div>
                                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Source / Tag</label>
                                        <div class="flex flex-wrap gap-1.5 mb-1.5" id="task-source-chips">
                                            <!-- Chips populated dynamically -->
                                        </div>
                                        <input type="text" id="new-task-source" placeholder="Or type new source..." class="bg-slate-950 border border-slate-800 rounded-md px-2 py-1.5 text-xs text-white outline-none focus:border-slate-600 w-full">
                                    </div>
                                    
                                    <!-- Notes -->
                                    <div>
                                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Notes</label>
                                        <textarea id="new-task-notes" placeholder="Add any additional notes here..." rows="2" class="bg-slate-950 border border-slate-800 rounded-md px-2 py-1.5 text-xs text-white outline-none focus:border-slate-600 w-full resize-none"></textarea>
                                    </div>
                                    
                                    <!-- Difficulty Selection -->
                                    <div id="difficulty-section">
                                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Difficulty</label>
                                        <div class="flex gap-2" id="task-difficulty-btns">
                                            <button type="button" data-diff="easy" class="diff-btn flex-1 py-1.5 rounded-md text-xs font-bold border border-slate-700 text-slate-400 hover:text-white transition-colors" data-active="false">Easy</button>
                                            <button type="button" data-diff="medium" class="diff-btn flex-1 py-1.5 rounded-md text-xs font-bold border border-[#ff6b35] bg-[#ff6b35]/10 text-[#ff6b35] transition-colors" data-active="true">Medium</button>
                                            <button type="button" data-diff="hard" class="diff-btn flex-1 py-1.5 rounded-md text-xs font-bold border border-slate-700 text-slate-400 hover:text-white transition-colors" data-active="false">Hard</button>
                                        </div>
                                    </div>

                                    <!-- Date Selection -->
                                    <div>
                                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Date</label>
                                        <div class="flex gap-2 items-center flex-wrap" id="task-date-btns">
                                            <button type="button" data-date="today" class="date-btn px-3 py-1.5 rounded-md text-xs font-bold border border-[#ff6b35] bg-[#ff6b35]/10 text-[#ff6b35] transition-colors">Today</button>
                                            <button type="button" data-date="tomorrow" class="date-btn px-3 py-1.5 rounded-md text-xs font-bold border border-slate-700 text-slate-400 hover:text-white transition-colors">Tomorrow</button>
                                            <input type="date" id="new-task-date-picker" class="bg-slate-950 border border-slate-800 rounded-md px-2 py-1.5 text-xs text-white outline-none focus:border-slate-600 w-full sm:w-auto sm:ml-auto mt-2 sm:mt-0">
                                        </div>
                                    </div>

                                    <div class="flex justify-end mt-2">
                                        <button type="button" id="btn-save-new-item" class="text-xs font-bold text-white bg-[#ff6b35] hover:bg-[#ff8c61] px-4 py-2 rounded-lg transition-colors flex items-center gap-1">
                                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Active Tasks -->
                        <div id="active-tasks-list" class="space-y-2 flex-1 overflow-y-auto custom-scrollbar pr-2">
                            <!-- Tasks will be rendered here -->
                        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8TJUSbLBabNuW5RqAwWWOtxL-pZ4iOSc",
            authDomain: "habit-track-4e1c9.firebaseapp.com",
            projectId: "habit-track-4e1c9",
            storageBucket: "habit-track-4e1c9.firebasestorage.app",
            messagingSenderId: "361569656644",
            appId: "1:361569656644:web:53318c27d47b0df5b50111",
            measurementId: "G-7Q04BPF2TN"
        };
        const LOCAL_STORAGE_KEY = 'level_up_life_db';
        const INITIAL_STATS = { level: 1, currentXp: 0, nextLevelXp: 100, attributes: { BODY: 1, MIND: 1, SOUL: 1 } };
        const STAT_ICONS = { 
            BODY: '<i data-lucide="activity" class="w-4 h-4"></i>', 
            MIND: '<i data-lucide="brain" class="w-4 h-4"></i>', 
            SOUL: '<i data-lucide="heart" class="w-4 h-4"></i>' 
        };

        let app, auth, db;
        let isOfflineMode = false;
        let state = {
            user: null,
            habits: [],
            gratitudeLogs: [],
            tasks: [],
            stats: { ...INITIAL_STATS },
            ui: {
                selectedDate: new Date(),
                viewDate: new Date(),
                modalType: 'good', 
                selectedStat: 'BODY',
                currentTab: 'tasks',
                expandedTaskId: null,
                showCompletedTasks: false
            }
        };
        let radarChartInstance = null;
        let calendarInstance = null;

        window.switchTab = (tab) => {
            state.ui.currentTab = tab;
            const viewHabits = document.getElementById('view-habits');
            const viewTasks = document.getElementById('view-tasks');
            
            if (tab === 'habits') {
                viewHabits.style.display = 'grid';
                viewTasks.style.display = 'none';
            } else {
                viewHabits.style.display = 'none';
                viewTasks.style.display = 'grid';
            }
            
            const navHabits = document.getElementById('nav-habits');
            const navTasks = document.getElementById('nav-tasks');
            
            if (tab === 'habits') {
                navHabits.className = "px-4 py-1.5 rounded-md text-sm font-bold bg-[#ff6b35] text-white shadow-sm transition-all";
                navTasks.className = "px-4 py-1.5 rounded-md text-sm font-bold text-slate-400 hover:text-white transition-all";
            } else {
                navTasks.className = "px-4 py-1.5 rounded-md text-sm font-bold bg-[#ff6b35] text-white shadow-sm transition-all";
                navHabits.className = "px-4 py-1.5 rounded-md text-sm font-bold text-slate-400 hover:text-white transition-all";
                if (calendarInstance) {
                    setTimeout(() => calendarInstance.render(), 10);
                }
            }
        };

        window.selectDate = (dateStr) => { state.ui.selectedDate = new Date(dateStr); renderAll(); };
        window.toggleHabit = (id) => {
            if(!window.dateFns) return;
            const habit = state.habits.find(h => h.id === id);
            if (!habit) return;
            const dateStr = dateFns.format(state.ui.selectedDate, 'yyyy-MM-dd');
            const isCompleted = habit.completedDates.includes(dateStr);
            const mult = habit.type === 'good' ? 1 : -1;
            if (isCompleted) {
                habit.completedDates = habit.completedDates.filter(d => d !== dateStr);
                updateStats(-10 * mult, habit.stat, -1 * mult);
            } else {
                habit.completedDates.push(dateStr);
                updateStats(10 * mult, habit.stat, 1 * mult);
            }
            renderAll();
            saveData();
        };
        window.deleteHabit = (id) => {
            if (confirm("Delete this quest?")) {
                state.habits = state.habits.filter(h => h.id !== id);
                renderAll();
                saveData();
            }
        };
        window.deleteGratitude = (id) => {
            if(confirm("Remove entry?")) {
                state.gratitudeLogs = state.gratitudeLogs.filter(g => g.id !== id);
                updateStats(-5, 'SOUL', -1);
                renderAll();
                saveData();
            }
        };

        window.addTask = (title, source = '', difficulty = 'medium', date = null, type = 'task', startTime = '', endTime = '', notes = '') => {
            if (!title.trim()) return;
            const newTask = {
                id: crypto.randomUUID(),
                title: title.trim(),
                notes: notes.trim(),
                source: source.trim(),
                difficulty: difficulty,
                date: date || state.ui.newTaskDate || dateFns.format(new Date(), 'yyyy-MM-dd'),
                type: type,
                startTime: startTime,
                endTime: endTime,
                completed: false,
                createdAt: new Date().toISOString()
            };
            state.tasks.push(newTask);
            state.ui.newTaskDate = null; // Reset after adding
            renderTasks();
            updateCalendarEvents();
            saveData();
        };

        window.toggleTask = (id) => {
            const task = state.tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                if (task.completed) {
                    updateStats(20, 'MIND', 1); // Reward for completing a task
                } else {
                    updateStats(-20, 'MIND', -1);
                }
                renderTasks();
                updateCalendarEvents();
                saveData();
            }
        };

        window.deleteTask = (id) => {
            if (confirm("Delete this task?")) {
                state.tasks = state.tasks.filter(t => t.id !== id);
                if (state.ui.expandedTaskId === id) state.ui.expandedTaskId = null;
                renderTasks();
                updateCalendarEvents();
                saveData();
            }
        };

        window.expandTask = (id) => {
            state.ui.expandedTaskId = state.ui.expandedTaskId === id ? null : id;
            renderTasks();
        };

        window.updateTask = (id, field, value) => {
            const task = state.tasks.find(t => t.id === id);
            if (task) {
                task[field] = value;
                renderTasks();
                updateCalendarEvents();
                saveData();
            }
        };

        window.toggleCompletedTasks = () => {
            state.ui.showCompletedTasks = !state.ui.showCompletedTasks;
            const list = document.getElementById('completed-tasks-list');
            const icon = document.getElementById('completed-tasks-icon');
            if (state.ui.showCompletedTasks) {
                list.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                list.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        };
        window.toggleGratitudeHistory = () => document.getElementById('gratitude-history').classList.toggle('hidden');
        window.openModal = (type) => {
            state.ui.modalType = type;
            const modal = document.getElementById('habit-modal');
            const titleEl = document.getElementById('modal-title');
            const colorClass = type === 'good' ? 'text-[#ff6b35]' : 'text-rose-500';
            titleEl.innerHTML = `<span class="${colorClass}">Add ${type === 'good' ? 'Positive' : 'Negative'} Habit</span>`;
            document.getElementById('modal-habit-title').value = '';
            document.getElementById('modal-habit-title').focus();
            document.getElementById('modal-stat-selector').innerHTML = Object.entries({BODY: 'Body', MIND: 'Mind', SOUL: 'Soul'}).map(([key, label]) => `
                <button onclick="window.selectStat('${key}')" data-key="${key}" class="stat-btn p-3 rounded-xl border flex flex-col items-center gap-2 transition-all ${state.ui.selectedStat === key ? 'bg-white border-white text-slate-900 shadow-lg' : 'bg-slate-900 border-slate-700 text-slate-400 hover:border-slate-500'}">
                    ${STAT_ICONS[key]} <span class="text-[10px] font-bold uppercase">${label}</span>
                </button>`).join('');
            modal.classList.remove('hidden');
            safeCreateIcons();
        };
        window.selectStat = (key) => {
            state.ui.selectedStat = key;
            const btns = document.querySelectorAll('.stat-btn');
            btns.forEach(btn => {
                if(btn.dataset.key === key) btn.className = "stat-btn p-3 rounded-xl border flex flex-col items-center gap-2 transition-all bg-white border-white text-slate-900 shadow-lg";
                else btn.className = "stat-btn p-3 rounded-xl border flex flex-col items-center gap-2 transition-all bg-slate-900 border-slate-700 text-slate-400 hover:border-slate-500";
            });
        };
        window.closeModal = () => document.getElementById('habit-modal').classList.add('hidden');

        function safeCreateIcons() { if (window.lucide) window.lucide.createIcons(); else setTimeout(safeCreateIcons, 100); }
        function showScreen(screenName) {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.add('hidden');
            if (screenName === 'login') document.getElementById('login-screen').classList.remove('hidden');
            if (screenName === 'dashboard') document.getElementById('dashboard-screen').classList.remove('hidden');
        }
        function addGratitude() {
            if(!window.dateFns) return;
            const input = document.getElementById('gratitude-input');
            const val = input.value.trim();
            if (!val) return;
            state.gratitudeLogs.unshift({ id: crypto.randomUUID(), date: dateFns.format(state.ui.selectedDate, 'yyyy-MM-dd'), content: val, createdAt: new Date().toISOString() });
            updateStats(5, 'SOUL', 1);
            input.value = '';
            renderAll();
            saveData();
        }
        function updateStats(xpChange, statKey, statChange) {
            let { level, currentXp, nextLevelXp, attributes } = state.stats;
            currentXp = Math.max(0, currentXp + xpChange);
            attributes[statKey] = Math.max(1, attributes[statKey] + statChange);
            while (currentXp >= nextLevelXp) { currentXp -= nextLevelXp; level += 1; nextLevelXp = Math.floor(nextLevelXp * 1.2); }
            state.stats = { level, currentXp, nextLevelXp, attributes };
            renderStats();
            saveData();
        }

        function renderAll() { renderStats(); renderDate(); renderHabits(); renderHeatmap(); renderGratitude(); renderTasks(); updateCalendarEvents(); safeCreateIcons(); }
        
        function updateCalendarEvents() {
            if (!calendarInstance) return;
            const events = state.tasks.map(t => {
                const isMeeting = t.type === 'meeting';
                const hasTime = isMeeting && t.startTime;
                
                let start = t.date;
                if (hasTime) {
                    start = `${t.date}T${t.startTime}`;
                }
                
                let end = null;
                if (hasTime && t.endTime) {
                    end = `${t.date}T${t.endTime}`;
                }

                return {
                    id: t.id,
                    title: t.title,
                    start: start,
                    end: end,
                    allDay: !hasTime,
                    backgroundColor: t.completed ? '#334155' : (isMeeting ? 'rgba(15, 23, 42, 0.6)' : '#2563eb'),
                    textColor: t.completed ? '#94a3b8' : (isMeeting ? '#f8fafc' : '#ffffff'),
                    borderColor: t.completed ? 'transparent' : (isMeeting ? 'rgba(255, 255, 255, 0.08)' : 'transparent'),
                    extendedProps: {
                        isMeeting: isMeeting,
                        completed: t.completed,
                        difficulty: t.difficulty,
                        startTime: t.startTime,
                        endTime: t.endTime
                    }
                };
            });
            calendarInstance.removeAllEvents();
            calendarInstance.addEventSource(events);
        }

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            if (calendarEl && window.FullCalendar) {
                calendarInstance = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'timeGridWeek',
                    scrollTime: '11:00:00',
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth,timeGridWeek,timeGridDay'
                    },
                    height: '100%',
                    events: [],
                    editable: true, // Enable drag and drop
                    eventContent: function(arg) {
                        const props = arg.event.extendedProps;
                        const isMeeting = props.isMeeting;
                        const completed = props.completed;
                        const isMonthView = arg.view.type === 'dayGridMonth';
                        
                        let html = '';
                        
                        if (isMeeting) {
                            // Meeting style (Dark mode)
                            const timeText = (arg.timeText && !isMonthView) ? `<div class="text-[10px] opacity-90 leading-tight">${arg.timeText}</div>` : '';
                            html = `
                                <div class="w-full h-full flex flex-col justify-start overflow-hidden">
                                    <div class="font-medium text-[11px] leading-tight truncate">${arg.event.title}</div>
                                    ${timeText}
                                </div>
                            `;
                        } else {
                            // Task style (Dark mode)
                            const icon = completed ? 
                                `<svg class="w-3 h-3 mr-1 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>` : 
                                `<svg class="w-3 h-3 mr-1 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>`;
                            
                            const textDecoration = completed ? 'line-through' : 'none';
                            
                            html = `
                                <div class="w-full h-full flex items-center overflow-hidden">
                                    ${icon}
                                    <div class="font-medium text-[11px] truncate" style="text-decoration: ${textDecoration}">${arg.event.title}</div>
                                </div>
                            `;
                        }
                        
                        return { html: html };
                    },
                    eventDrop: function(info) {
                        const newDate = dateFns.format(info.event.start, 'yyyy-MM-dd');
                        const task = state.tasks.find(t => t.id === info.event.id);
                        if (task) {
                            task.date = newDate;
                            if (task.type === 'meeting') {
                                if (!info.event.allDay) {
                                    task.startTime = dateFns.format(info.event.start, 'HH:mm');
                                    if (info.event.end) {
                                        task.endTime = dateFns.format(info.event.end, 'HH:mm');
                                    } else {
                                        // Default to 1 hour if no end time is provided by the drop
                                        const endDate = dateFns.addHours(info.event.start, 1);
                                        task.endTime = dateFns.format(endDate, 'HH:mm');
                                    }
                                } else {
                                    task.startTime = '';
                                    task.endTime = '';
                                }
                            } else {
                                // If a task is dropped into a time slot, we could convert it to a meeting,
                                // but for now we just update its date and keep it as an all-day task.
                                // FullCalendar might render it at the time slot until we refresh events.
                            }
                            window.renderTasks();
                            window.updateCalendarEvents();
                            window.saveData();
                        }
                    },
                    eventResize: function(info) {
                        const task = state.tasks.find(t => t.id === info.event.id);
                        if (task && task.type === 'meeting' && !info.event.allDay && info.event.end) {
                            task.endTime = dateFns.format(info.event.end, 'HH:mm');
                            window.renderTasks();
                            window.updateCalendarEvents();
                            window.saveData();
                        }
                    },
                    dateClick: function(info) {
                        const hasTime = info.dateStr.includes('T');
                        if (hasTime) {
                            window.openMeetingModal(info);
                        } else {
                            state.ui.newTaskDate = info.dateStr;
                            const input = document.getElementById('new-task-input');
                            input.placeholder = `Add task for ${info.dateStr}... (Enter to save)`;
                            
                            // Also update the date picker in the options panel
                            const datePicker = document.getElementById('new-task-date-picker');
                            if (datePicker) {
                                datePicker.value = info.dateStr;
                                // Reset date buttons since it's a custom date
                                const dateBtns = document.querySelectorAll('#task-date-btns .date-btn');
                                dateBtns.forEach(b => {
                                    b.className = 'date-btn px-3 py-1.5 rounded-md text-xs font-bold border border-slate-700 text-slate-400 hover:text-white transition-colors';
                                });
                            }
                            
                            input.focus();
                        }
                    },
                    eventClick: function(info) {
                        const task = state.tasks.find(t => t.id === info.event.id);
                        if (task) {
                            if (task.type === 'meeting') {
                                window.openMeetingModal(null, task);
                            } else {
                                window.expandTask(info.event.id);
                                // Scroll to the task in the list
                                setTimeout(() => {
                                    const taskEl = document.getElementById(`task-el-${info.event.id}`);
                                    if (taskEl) {
                                        taskEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    }
                                }, 100);
                            }
                        }
                    }
                });
                calendarInstance.render();
                updateCalendarEvents();
            }
        }

        function renderTasks() {
            const activeList = document.getElementById('active-tasks-list');
            const completedList = document.getElementById('completed-tasks-list');
            const completedCount = document.getElementById('completed-tasks-count');
            
            if (!activeList || !completedList) return;

            activeList.innerHTML = '';
            completedList.innerHTML = '';
            
            let completedTasksCount = 0;

            const createTaskHTML = (task) => {
                const isExpanded = state.ui.expandedTaskId === task.id;
                const isCompleted = task.completed;
                const isMeeting = task.type === 'meeting';
                
                let html = `
                <div id="task-el-${task.id}" class="bg-slate-900/50 border ${isExpanded ? 'border-[#ff6b35]' : 'border-slate-800'} rounded-xl p-3 transition-colors">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="window.expandTask('${task.id}')">
                        <div onclick="event.stopPropagation(); window.toggleTask('${task.id}')" class="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-colors ${isCompleted ? 'border-[#10b981] bg-[#10b981]/20' : 'border-slate-600 hover:border-[#ff6b35]'}">
                            ${isCompleted ? '<i data-lucide="check" class="w-3 h-3 text-[#10b981]"></i>' : (isMeeting ? '<i data-lucide="users" class="w-3 h-3 text-slate-400"></i>' : '')}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-medium ${isCompleted ? 'text-slate-500 line-through' : 'text-slate-200'} truncate">${task.title}</h4>
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0">

        function renderHeatmap() {
            if(!window.dateFns) return;

            const renderGrid = (suffix, type) => {
                const grid = document.getElementById(`heatmap-grid-${suffix}`);
                const monthsContainer = document.getElementById(`heatmap-months-${suffix}`);
                if(!grid || !monthsContainer) return;
                
                grid.innerHTML = '';
                monthsContainer.innerHTML = '';
                
                const isPositive = type === 'good';
                const activeHabits = state.habits.filter(h => h.type === type);
                
                const today = new Date();
                const endOfCurrentMonth = dateFns.endOfMonth(today);
                const endOfGrid = dateFns.endOfWeek(endOfCurrentMonth, { weekStartsOn: 1 });
                const startDate = dateFns.subMonths(dateFns.startOfMonth(today), 3);
                const startOfGrid = dateFns.startOfWeek(startDate, { weekStartsOn: 1 });

                const days = dateFns.eachDayOfInterval({ start: startOfGrid, end: endOfGrid });
                const totalWeeks = Math.ceil(days.length / 7);
                
                let html = '';
                let currentMonth = -1;
                
                days.forEach((day, index) => {
                    const dateStr = dateFns.format(day, 'yyyy-MM-dd');
                    const isFuture = dateFns.isAfter(day, today);

                    if(day.getMonth() !== currentMonth && day.getDay() === 1) { 
                        currentMonth = day.getMonth();
                        const weekIdx = Math.floor(index / 7);
                        const leftPos = (weekIdx / totalWeeks) * 100;
                        if(leftPos < 90) { 
                           monthsContainer.innerHTML += `<div style="position:absolute; left:${leftPos}%">${dateFns.format(day, 'MMM')}</div>`;
                        }
                    }

                    const isSelected = dateFns.isSameDay(day, state.ui.selectedDate);
                    
                    let colorClass = 'bg-[#1e293b]';
                    if (isFuture) {
                         colorClass = 'bg-[#0f172a]';
                    } else {
                        let count = 0;
                        activeHabits.forEach(h => { if(h.completedDates.includes(dateStr)) count++; });
                        if(isPositive) count += state.gratitudeLogs.filter(g => g.date === dateStr).length;

                        if (count > 0) {
                            if (isPositive) colorClass = count > 2 ? 'bg-[#ff6b35]' : count > 1 ? 'bg-[#ff8c61]' : 'bg-[#ff8c61]/40';
                            else colorClass = count > 2 ? 'bg-rose-600' : count > 1 ? 'bg-rose-500' : 'bg-rose-500/40';
                        }
                    }
                    
                    const border = isSelected ? 'ring-2 ring-white z-20' : 'border border-transparent hover:border-white/50';
                    const cursor = isFuture ? 'cursor-default' : 'cursor-pointer';
                    const clickEvent = isFuture ? '' : `onclick="window.selectDate('${dateStr}')"`;

                    html += `<div ${clickEvent} data-tooltip="${isFuture ? '' : dateStr}" class="rounded-sm ${cursor} transition-all ${colorClass} ${border}"></div>`;
                });
                grid.innerHTML = html;
            };

            renderGrid('good', 'good');
            renderGrid('bad', 'bad');
        }

        function initNewTaskOptions() {
            const input = document.getElementById('new-task-input');
            const optionsPanel = document.getElementById('new-task-options');
            const container = document.getElementById('new-task-container');
            
            if (!input || !optionsPanel || !container) return;

            // Show panel on focus
            input.addEventListener('focus', () => {
                optionsPanel.classList.remove('hidden');
                optionsPanel.classList.add('flex');
                renderSourceChips();
            });

            // Hide panel when clicking outside
            document.addEventListener('click', (e) => {
                if (!container.contains(e.target)) {
                    optionsPanel.classList.add('hidden');
                    optionsPanel.classList.remove('flex');
                }
            });

            // Handle Difficulty Buttons
            const diffBtns = document.querySelectorAll('#task-difficulty-btns .diff-btn');
            diffBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Reset all
                    diffBtns.forEach(b => {
                        b.className = 'diff-btn flex-1 py-1.5 rounded-md text-xs font-bold border border-slate-700 text-slate-400 hover:text-white transition-colors';
                        b.dataset.active = 'false';
                    });
                    // Set active
                    e.target.className = `diff-btn flex-1 py-1.5 rounded-md text-xs font-bold border border-[#ff6b35] bg-[#ff6b35]/10 text-[#ff6b35] transition-colors`;
                    e.target.dataset.active = 'true';
                });
            });

            // Handle Date Buttons
            const dateBtns = document.querySelectorAll('#task-date-btns .date-btn');
            const datePicker = document.getElementById('new-task-date-picker');
            
            const resetDateBtns = () => {
                dateBtns.forEach(b => {
                    b.className = 'date-btn px-3 py-1.5 rounded-md text-xs font-bold border border-slate-700 text-slate-400 hover:text-white transition-colors';
                });
            };

            dateBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    resetDateBtns();
                    e.target.className = `date-btn px-3 py-1.5 rounded-md text-xs font-bold border border-[#ff6b35] bg-[#ff6b35]/10 text-[#ff6b35] transition-colors`;
                    
                    const type = e.target.dataset.date;
                    if (type === 'today') {
                        datePicker.value = dateFns.format(new Date(), 'yyyy-MM-dd');
                    } else if (type === 'tomorrow') {
                        datePicker.value = dateFns.format(dateFns.addDays(new Date(), 1), 'yyyy-MM-dd');
                    }
                });
            });

            // Initialize date picker with today if not set
            if (!datePicker.value) {
                datePicker.value = dateFns.format(new Date(), 'yyyy-MM-dd');
            }
            
            datePicker.addEventListener('change', () => {
                resetDateBtns(); // Custom date selected

                saveBtn.addEventListener('click', () => {

            const title = document.getElementById('meeting-title').value;
            const source = document.getElementById('meeting-source').value;
            const notes = document.getElementById('meeting-notes').value;
            const date = document.getElementById('meeting-date').value;
            const startTime = document.getElementById('meeting-start').value;
            const endTime = document.getElementById('meeting-end').value;

            if (!title.trim()) {
                alert('Please enter a meeting title');
                return;
            }

            if (id) {
                // Update existing
                const meeting = state.tasks.find(t => t.id === id);
                if (meeting) {
                    meeting.title = title;
                    meeting.source = source;
                    meeting.notes = notes;
                    meeting.date = date;
                    meeting.startTime = startTime;
                    meeting.endTime = endTime;
                }
            } else {
                // Create new
                window.addTask(title, source, 'medium', date, 'meeting', startTime, endTime, notes);
            }

            window.renderTasks();
            window.updateCalendarEvents();
            window.saveData();
            closeMeetingModal();
        };

        window.deleteMeeting = () => {
            const id = document.getElementById('meeting-id').value;
            if (id && confirm('Delete this meeting?')) {
                state.tasks = state.tasks.filter(t => t.id !== id);
                window.renderTasks();
                window.updateCalendarEvents();
                window.saveData();
                closeMeetingModal();
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            safeCreateIcons();
            initCalendar();
            initNewTaskOptions();
            try { if (typeof firebase !== 'undefined') { app = firebase.initializeApp(firebaseConfig); auth = firebase.auth(); db = firebase.firestore(); } else { isOfflineMode = true; } } catch (e) { isOfflineMode = true; }

            const handleEnterToSave = (e) => {
                if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) {
                    e.preventDefault();
                    window.saveNewItem();
                }
            };

            const taskInput = document.getElementById('new-task-input');
            taskInput?.addEventListener('keydown', handleEnterToSave);
            
            const sourceInput = document.getElementById('new-task-source');
            sourceInput?.addEventListener('keydown', handleEnterToSave);

            const datePickerInput = document.getElementById('new-task-date-picker');
            datePickerInput?.addEventListener('keydown', handleEnterToSave);

            taskInput?.addEventListener('blur', (e) => {
                if (!e.target.value.trim()) {
                    state.ui.newTaskDate = null;
                    e.target.placeholder = 'Add a new task... (Enter to save)';
                }
            });

            document.getElementById('btn-save-habit')?.addEventListener('click', () => {
                const title = document.getElementById('modal-habit-title').value;
                if (!title.trim()) return;
                state.habits.push({ id: crypto.randomUUID(), title, type: state.ui.modalType, stat: state.ui.selectedStat, xpReward: 10, statReward: 1, completedDates: [], streak: 0, createdAt: new Date().toISOString() });
                saveData(); renderAll(); window.closeModal();
            });
            document.getElementById('btn-add-gratitude')?.addEventListener('click', addGratitude);
            document.getElementById('gratitude-input')?.addEventListener('keydown', (e) => {
                // Change to Shift+Enter to submit
                if (e.key === 'Enter' && e.shiftKey) {
                    e.preventDefault();
                    addGratitude();
                }
            });
            const checkExpiry = () => {
                const loginTime = localStorage.getItem('login_timestamp');
                if (loginTime && (Date.now() - parseInt(loginTime)) > 14 * 24 * 60 * 60 * 1000) {
                    localStorage.removeItem('login_timestamp');
                    localStorage.removeItem('offline_mode_active');
                    return true;
                }
                return false;
            };

            document.getElementById('btn-logout')?.addEventListener('click', () => { localStorage.removeItem('login_timestamp'); localStorage.removeItem('offline_mode_active'); if (isOfflineMode) { state.user = null; isOfflineMode = false; showScreen('login'); window.location.reload(); } else { auth.signOut(); } });
            document.getElementById('btn-offline-mode')?.addEventListener('click', () => { isOfflineMode = true; localStorage.setItem('offline_mode_active', 'true'); localStorage.setItem('login_timestamp', Date.now().toString()); state.user = { uid: "offline_user", email: "offline@hero.com", displayName: "Offline Hero" }; document.getElementById('user-display-name').innerText = "Offline Hero"; loadUserData("offline_user"); showScreen('dashboard'); });
            
            const authForm = document.getElementById('auth-form');
            if(authForm) {
                authForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('input-email').value;
                    const password = document.getElementById('input-password').value;
                    const username = document.getElementById('input-username').value;
                    const isRegistering = !document.getElementById('username-field').classList.contains('hidden');
                    try { 
                        if (auth && auth.setPersistence) await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                        if (isRegistering) { const cred = await auth.createUserWithEmailAndPassword(email, password); if (cred.user) await cred.user.updateProfile({ displayName: username }); } else { await auth.signInWithEmailAndPassword(email, password); } 
                        localStorage.setItem('login_timestamp', Date.now().toString());
                    } catch (err) { alert(err.message); }
                });
            }
            document.getElementById('btn-toggle-auth-mode')?.addEventListener('click', () => { const userField = document.getElementById('username-field'); const isHidden = userField.classList.contains('hidden'); userField.classList.toggle('hidden'); document.getElementById('btn-submit-auth').innerText = isHidden ? "Start Journey" : "Create Account"; document.getElementById('btn-toggle-auth-mode').innerText = isHidden ? "Create new account" : "Back to Login"; });

            const isExpired = checkExpiry();
            if (localStorage.getItem('offline_mode_active') === 'true' && !isExpired) {
                isOfflineMode = true;
                state.user = { uid: "offline_user", email: "offline@hero.com", displayName: "Offline Hero" }; 
                document.getElementById('user-display-name').innerText = "Offline Hero"; 
                loadUserData("offline_user"); 
                showScreen('dashboard'); 
            } else if (!isOfflineMode && auth) { 
                auth.onAuthStateChanged(async (user) => { 
                    if (user && !checkExpiry()) { 
                        localStorage.setItem('login_timestamp', Date.now().toString()); // Rolling 14 days
                        state.user = user; 
                        document.getElementById('user-display-name').innerText = user.displayName || "Hero"; 
                        await loadUserData(user.uid); 
                        showScreen('dashboard'); 
                    } else { 
                        if (user) auth.signOut();
                        state.user = null; 
                        showScreen('login'); 
                    } 
                }); 
            }
            setTimeout(() => { document.getElementById('loading-overlay').classList.add('hidden'); if(!state.user && document.getElementById('dashboard-screen').classList.contains('hidden')) { document.getElementById('login-screen').classList.remove('hidden'); } }, 1000);
        });

        async function loadUserData(uid) {
            let localData = null;
            try { localData = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)); } catch (e) {}
            if (!isOfflineMode && db) {
                try {
                    const docSnap = await db.collection('users').doc(uid).get();
                    if (docSnap.exists) { const data = docSnap.data(); state.habits = (data.habits || []).map(h => ({...h, type: h.type || 'good'})); state.gratitudeLogs = data.gratitudeLogs || []; state.tasks = data.tasks || []; state.stats = data.stats || INITIAL_STATS; } 
                    else { if(localData) { state.habits = localData.habits || []; state.gratitudeLogs = localData.gratitudeLogs || []; state.tasks = localData.tasks || []; state.stats = localData.stats || INITIAL_STATS; } await db.collection('users').doc(uid).set({ habits: state.habits, gratitudeLogs: state.gratitudeLogs, tasks: state.tasks, stats: state.stats }, { merge: true }); }
                } catch (e) { if(localData) { state.habits = localData.habits || []; state.gratitudeLogs = localData.gratitudeLogs || []; state.tasks = localData.tasks || []; state.stats = localData.stats || INITIAL_STATS; } }
            } else if(localData) { state.habits = localData.habits || []; state.gratitudeLogs = localData.gratitudeLogs || []; state.tasks = localData.tasks || []; state.stats = localData.stats || INITIAL_STATS; }
            renderAll();
        }
        async function saveData() {
            const dataToSave = { habits: state.habits, gratitudeLogs: state.gratitudeLogs, tasks: state.tasks, stats: state.stats };
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(dataToSave));
            if (!isOfflineMode && state.user && state.user.uid !== 'offline_user' && db) {
                document.getElementById('saving-indicator').classList.remove('hidden');
                try { await db.collection('users').doc(state.user.uid).set(dataToSave, { merge: true }); } catch (e) { console.error(e); }
                finally { setTimeout(() => document.getElementById('saving-indicator').classList.add('hidden'), 500); }
            }
        }
    </script>
<script type="module" src="/index.tsx"></script>
